<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="100" cy="100" r="95" stroke="url(#grad1)" stroke-width="2" fill="none"/>
  
  <!-- Building icon -->
  <g transform="translate(60, 50)">
    <!-- Main building -->
    <rect x="10" y="20" width="60" height="80" fill="#0ea5e9" rx="4"/>
    
    <!-- Windows -->
    <rect x="20" y="30" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    <rect x="48" y="30" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    <rect x="20" y="50" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    <rect x="48" y="50" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    <rect x="20" y="70" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    <rect x="48" y="70" width="12" height="12" fill="white" opacity="0.8" rx="2"/>
    
    <!-- Door -->
    <rect x="32" y="85" width="16" height="15" fill="white" opacity="0.9" rx="2"/>
    
    <!-- Roof -->
    <path d="M 5 20 L 40 5 L 75 20" stroke="#d946ef" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Blockchain link symbol -->
    <circle cx="75" cy="15" r="8" fill="#d946ef"/>
    <circle cx="75" cy="15" r="5" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#grad1)" text-anchor="middle">
    NOTARIAL
  </text>
</svg>
